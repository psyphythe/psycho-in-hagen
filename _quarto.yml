#
  page-footer:
    left: >-
      © 2026 Anna
    right: "made with ❤️ and [Quarto.org](https://quarto.org)"

format:
  html:
    theme: cerulean        
    mainfont: "EB Garamond, Georgia, serif"
    date: last-modified
    date-format: "DD.MM.YYYY"
    code-fold: true     
    code-summary: "Code anzeigen"
    title-block-style: default 
    toc: true           
    toc-location: right 
    number-sections: true
    smooth-scroll: true
    fig-cap-location: bottom
    # Optimierung für Quarto Pub Speicherplatz (DPI senken)
    fig-dpi: 150